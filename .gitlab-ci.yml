stages:
  - test
  - build
  - deploy

variables:
  GIT_STRATEGY: clone

.test: &test
  stage: test
  script:
    - python -m pip install ./
    - python ./run_tests.py

Test python 3.10:
  <<: *test
  image: python:3.10

Test python 3.11:
  <<: *test
  image: python:3.11

Test python 3.12:
  <<: *test
  image: python:3.12

Test python 3.13:
  <<: *test
  image: python:3.13

#Test python 3.14:
#  <<: *test
#  image: python:3.14

.test_mysql: &test_mysql
  stage: test
  image: python:3.13-bookworm
  variables:
    DATABASE_ENGINE: "django.db.backends.mysql"
    DATABASE_HOST: "mysql"
    DATABASE_PORT: 3306
    DATABASE_NAME: "test_db"
    DATABASE_USER: "test_user"
    DATABASE_PASSWORD: "test_password"
    MYSQL_ROOT_PASSWORD: "root"
    MYSQL_DATABASE: "test_${DATABASE_NAME}"
    MYSQL_USER: $DATABASE_USER
    MYSQL_PASSWORD: $DATABASE_PASSWORD
  before_script:
    - apt-get update && apt-get install -y default-mysql-client
    - python -m pip install mysqlclient
    - until mysqladmin ping -h "${DATABASE_HOST}" --silent; do echo "Waiting for database..."; sleep 1; done
  script:
    - python -m pip install ./
    - python ./run_tests.py

Test python 3.13 mysql 8.4:
  <<: *test_mysql
  services:
    - name: mysql:8.4
      alias: mysql

Test python 3.13 mysql 9.2:
  <<: *test_mysql
  services:
    - name: mysql:9.2
      alias: mysql


.test_postgres: &test_postgres
  stage: test
  image: python:3.13
  variables:
    DATABASE_ENGINE: "django.db.backends.postgresql"
    DATABASE_HOST: "postgres"
    DATABASE_PORT: 5432
    DATABASE_NAME: "test_db"
    DATABASE_USER: "test_user"
    DATABASE_PASSWORD: "test_password"
    POSTGRES_DB: "test_${DATABASE_NAME}"
    POSTGRES_USER: $DATABASE_USER
    POSTGRES_PASSWORD: $DATABASE_PASSWORD
  before_script:
    - apt-get update && apt-get install -y postgresql-client
    - python -m pip install psycopg["binary"]
    - until pg_isready -h "${DATABASE_HOST}" -p "${DATABASE_PORT}" -U "${DATABASE_USER}" --quiet; do echo "Waiting for database..."; sleep 1; done
  script:
    - python -m pip install ./
    - python ./run_tests.py

Test python 3.13 postgres 14:
  <<: *test_postgres
  services:
    - name: postgres:14
      alias: postgres

Test python 3.13 postgres 15:
  <<: *test_postgres
  services:
